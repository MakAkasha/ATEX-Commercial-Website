<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATEX | دخول الإدارة</title>
    <link rel="icon" href="/assets/atex-icon.ico" />
    <link rel="icon" type="image/svg+xml" href="/assets/ATEX-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.rtl.min.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="d-flex flex-column">
    <div class="page page-center">
      <div class="container-tight py-4">

        <div class="text-center mb-4">
          <a href="/" class="navbar-brand navbar-brand-autodark">
            <img src="/assets/ATEX-logo.svg" height="40" alt="ATEX" />
          </a>
        </div>

        <div class="card card-md shadow-sm">
          <div class="card-body">
            <h2 class="h2 text-center mb-1">تسجيل الدخول</h2>
            <p class="text-muted text-center mb-4">أدخل بياناتك للمتابعة إلى لوحة الإدارة.</p>

            <form id="loginForm" autocomplete="on">
              <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input
                  class="form-control"
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  placeholder="اسم المستخدم"
                  autofocus
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input
                  class="form-control"
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="كلمة المرور"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-check">
                  <input class="form-check-input" type="checkbox" id="togglePassword" />
                  <span class="form-check-label">إظهار كلمة المرور</span>
                </label>
              </div>
              <div class="form-footer">
                <button class="btn btn-primary w-100" type="submit">
                  دخول إلى اللوحة
                </button>
              </div>
            </form>

            <div class="alert alert-danger mt-3" id="errorBox" hidden></div>
          </div>
        </div>

        <div class="text-center text-muted mt-3">
          <a href="/" class="text-muted">العودة إلى الموقع</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <script src="/admin/admin.js"></script>
  </body>
</html>
